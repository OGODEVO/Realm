services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222", "--auth", "agentnet_secret_token"]
    ports:
      - "4222:4222"
      - "8222:8222"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentnet}
      POSTGRES_USER: ${POSTGRES_USER:-agentnet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentnet} -d ${POSTGRES_DB:-agentnet}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    volumes:
      - agentnet_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  registry:
    build:
      context: ..
      dockerfile: services/registry/Dockerfile
    environment:
      NATS_URL: nats://agentnet_secret_token@nats:4222
      DATABASE_URL: ${DATABASE_URL:-postgresql://agentnet:change_me_local@postgres:5432/agentnet}
      SESSION_RETENTION_DAYS: "14"
      AGENT_TTL_SECONDS: "40"
      HEARTBEAT_INTERVAL_SECONDS: "12"
      GC_INTERVAL_SECONDS: "5"
      REGISTRY_SERVER_ID: "registry"
      THREAD_SOFT_LIMIT_TOKENS: "${THREAD_SOFT_LIMIT_TOKENS:-50000}"
      THREAD_HARD_LIMIT_TOKENS: "${THREAD_HARD_LIMIT_TOKENS:-60000}"
      THREAD_KEEP_TAIL_MESSAGES: "${THREAD_KEEP_TAIL_MESSAGES:-24}"
      THREAD_COMPACTION_EVENT_ENABLED: "${THREAD_COMPACTION_EVENT_ENABLED:-true}"
      THREAD_COMPACTION_EVENT_COOLDOWN_SECONDS: "${THREAD_COMPACTION_EVENT_COOLDOWN_SECONDS:-120}"
      TOKEN_ESTIMATE_CHARS_PER_TOKEN: "${TOKEN_ESTIMATE_CHARS_PER_TOKEN:-4}"
      DEV_AUTH: "${DEV_AUTH:-false}"
      DEV_AUTH_MAX_SKEW_SECONDS: "${DEV_AUTH_MAX_SKEW_SECONDS:-120}"
      DEV_AUTH_NONCE_TTL_SECONDS: "${DEV_AUTH_NONCE_TTL_SECONDS:-300}"
    depends_on:
      nats:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  agentnet_pg_data:
