services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  registry:
    build:
      context: ..
      dockerfile: services/registry/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      AGENT_TTL_SECONDS: "40"
      GC_INTERVAL_SECONDS: "5"
    depends_on:
      - nats
    restart: unless-stopped
